<div class="card p-4">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <p-toolbar styleClass="mb-4 gap-2">
    <ng-template pTemplate="left">
      <p-button label="חדש" icon="pi pi-plus" class="mr-2" (onClick)="openNew()"></p-button>
      <p-button severity="danger" label="מחיקה" icon="pi pi-trash" outlined 
                (onClick)="deleteSelectedCategories()" 
                [disabled]="!selectedCategories()?.length"></p-button>
    </ng-template>
    <ng-template pTemplate="right">
      <p-button label="ייצוא CSV" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()"></p-button>
    </ng-template>
  </p-toolbar>

  <p-table #dt 
           [value]="categories()" 
           [(selection)]="selectedCategories" 
           [columns]="cols" 
           [rows]="10" 
           [paginator]="true" 
           dataKey="id" 
           [rowHover]="true"
           [exportFilename]="'categories'">
    
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 4rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
        <th pSortableColumn="id"  class="text-center" style="width: 28%">מזהה <p-sortIcon field="id"></p-sortIcon></th>
        <th pSortableColumn="name" class="text-center" style="width: 36%">שם הקטגוריה <p-sortIcon field="name"></p-sortIcon></th>
        <th  class="text-center" style="width:32%">פעולות</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-category>
      <tr>
        <td><p-tableCheckbox [value]="category"></p-tableCheckbox></td>
        <td class="text-center">{{ category.id }}</td>
        <td class="text-center">{{ category.name }}</td>
        <td class="text-center">
          <div class="flex justify-content-center align-items-center gap-2">
            <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" (onClick)="editCategory(category)"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [outlined]="true" severity="danger" (onClick)="deleteCategory(category)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog [(visible)]="categoryDialog" header="פרטי קטגוריה" [modal]="true" [style]="{ width: '400px' }">
    <div class="flex flex-column gap-2 mt-2">
      <label for="name" class="font-bold">שם הקטגוריה</label>
      <input type="text" pInputText id="name" [(ngModel)]="activeCategory().name" required autofocus class="w-full" />
      <small class="p-error block" *ngIf="submitted() && !activeCategory().name">שדה חובה.</small>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="ביטול" [text]="true" (onClick)="categoryDialog.set(false)"></p-button>
      <p-button label="שמור" (onClick)="saveCategory()"></p-button>
    </ng-template>
  </p-dialog>
</div>
