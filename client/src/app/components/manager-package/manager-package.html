<div class="card p-4">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <p-toolbar styleClass="mb-4">
    <ng-template pTemplate="left">
      <p-button label="חדש" icon="pi pi-plus" class="mr-2" (onClick)="openNew()"></p-button>
      <p-button severity="danger" label="מחיקה" icon="pi pi-trash" [outlined]="true" 
                (onClick)="deleteSelectedPackages()" 
                [disabled]="!selectedPackages()?.length"></p-button>
    </ng-template>
    <ng-template pTemplate="right">
      <p-button label="ייצוא CSV" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()"></p-button>
    </ng-template>
  </p-toolbar>

  <p-table #dt 
           [value]="packages()" 
           [(selection)]="selectedPackages" 
           [columns]="cols" 
           dataKey="id" 
           [rows]="10" 
           [paginator]="true"
           [exportFilename]="'packages'">
    
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
        <th pSortableColumn="name" field="name">שם</th>
        <th pSortableColumn="price" field="price">מחיר</th>
        <th field="qtyClassicCards">קלאסי</th>
        <th field="qtySpecialCards">מיוחד</th>
        <th field="qtyPrimumCards">פרימיום</th>
        <th>פעולות</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-pkg>
      <tr>
        <td><p-tableCheckbox [value]="pkg"></p-tableCheckbox></td>
        <td>{{ pkg.name }}</td>
        <td>{{ pkg.price }} ₪</td>
        <td>{{ pkg.qtyClassicCards }}</td>
        <td>{{ pkg.qtySpecialCards }}</td>
        <td>{{ pkg.qtyPrimumCards }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" (onClick)="editPackage(pkg)"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [outlined]="true" severity="danger" (onClick)="deletePackage(pkg)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog [(visible)]="packageDialog" header="פרטי חבילה" [modal]="true" [style]="{ width: '450px' }">
    <div class="flex flex-column gap-3">
      <div class="field">
        <label class="font-bold">שם חבילה</label>
        <input type="text" pInputText [(ngModel)]="activePackage().name" class="w-full" />
      </div>
      <div class="field">
        <label class="font-bold">מחיר</label>
        <input type="number" pInputText [(ngModel)]="activePackage().price" class="w-full" />
      </div>
      <div class="grid">
        <div class="col-4">
          <label class="text-xs font-bold">כמות קלאסי</label>
          <input type="number" pInputText [(ngModel)]="activePackage().qtyClassicCards" class="w-full" />
        </div>
        <div class="col-4">
          <label class="text-xs font-bold">כמות מיוחד</label>
          <input type="number" pInputText [(ngModel)]="activePackage().qtySpecialCards" class="w-full" />
        </div>
        <div class="col-4">
          <label class="text-xs font-bold">כמות פרימיום</label>
          <input type="number" pInputText [(ngModel)]="activePackage().qtyPrimumCards" class="w-full" />
        </div>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="ביטול" [text]="true" (onClick)="packageDialog.set(false)"></p-button>
      <p-button label="שמור" (onClick)="savePackage()"></p-button>
    </ng-template>
  </p-dialog>
</div>
